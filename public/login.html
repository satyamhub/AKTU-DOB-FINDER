<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - AKTU DOB Finder</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
        --border: #1f2937;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(1200px 700px at 10% 10%, #1e293b, #0f172a);
        color: var(--text);
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        width: min(420px, 90vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 20px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0b1220;
        color: var(--text);
        font-size: 14px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 11px 16px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #06210f;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form class="card" method="post" action="/login">
      <h1>Login</h1>
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" />
      <button type="submit">Sign in</button>
    </form>
  </body>
</html>
